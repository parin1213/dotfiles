# --- 自作: 会話履歴監査（2026-07-07、全 47 セッション分析）から抽出した運用スキル群 ---
# 根拠と発動条件は各 SKILL.md の description に記載。運用で新知見が出たら SKILL.md を直接更新する。

[[skill]]
name = "overnight-autonomy"
type = "own"
# 夜間・長時間自走の運用規範（完遂・rate limit 監視・STATE.md・再開フォールバック・朝の引き継ぎ様式）。
# /loop の勝手終了×4 と limit 死→手動「つづけて」×10 が最大級の摩擦だったことへの対策。

[[skill]]
name = "subagent-review"
type = "own"
# サブエージェント委譲時の必須要素と成果物検収チェックリスト。
# 空洞テスト・架空 fixture・誤った否定結論の鵜呑みが本番到達の手戻りを起こしたことへの対策。

[[skill]]
name = "dependabot-sweep"
type = "own"
requires = "gh"
# bot PR（Dependabot/Renovate）一括処理の定型手順。repo 規約確認・逐次マージ・major 失敗は最新 LTS 引き上げ。

[[skill]]
name = "release-handoff"
type = "own"
# 実機検収ハンドオフの様式（依頼前の自己検証・前提条件・番号付き「操作→期待結果」・スマホ検収前提）。

[[skill]]
name = "chezmoi-change"
type = "own"
requires = "chezmoi"
# 環境変更の定型フロー（chezmoi managed ゲート・グリフ/BOM の罠・--force 判断・distribute まで）。
# 「実体を直接編集しない」ルールが即修正の局面で破られ続けたことへの手順的対策。

[[skill]]
name = "doc-writing"
type = "own"
# 自作（2026-07-07）。voice-trace（同日作の文体トレーススキル）を、本人実文書コーパス 44 件の
# 深読み分析で「一般原則＋ジャンル別の型＋本人の声」の3層に再設計したもの。
# SKILL.md=原則とワークフロー / references/genres.md=ジャンル別の型 / voice.md=語彙・記法・反面リスト /
# corpus.md=一次資料の所在。すべて観測値なので、本人の新しい手書き文書と答え合わせして更新する。

[[skill]]
name = "vault-capture"
type = "own"
# 汎用エンジニアリング知見・ハマりどころ・Blog 素材を ~/obsidian-vault に記録する定型フロー
# （sanitize → 置き場所判断 → identity 確認込みの手動 push）。
# 持ち込み基準・命名規約の正本は vault 側の AGENTS.md / style-guide.md に一本化し、スキルは入口だけ持つ。

