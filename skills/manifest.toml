[[skill]]
name = "pr-description-style"
type = "own"
# 自作（2026-07-02）。AI が書いた PR 本文への本人の微修正（grooves/ca-matching-skill#29）から
# 文体・節構成の好みを抽出した PR 特化スキル。japanese-tech-writing の上書き層として併用する。
