# 環境ごとの設定の正本表（chezmoi data）。**全 env を明示列挙**する。
# home/.chezmoitemplates/profile が os/kernel/hostname から env を判定し、この表の行を読む。
# consumer（mise / ghostty / starship / agents-env / bootstrap）はその profile を読むだけ。
# 設定変更・env 追加はこのファイルで完結（profile 側は「判定ロジック」のみ持つ）。
#
# フィールド:
#   weight            : full/lite/slim（mise が入れるツール量＝資源と用途）
#   ghostty_font_size : pt（PPI×スケーリングで決める。判断軸は ghostty/config.tmpl のコメント）
#   starship_icon     : プロンプト先頭アイコン。Nerd Font を \uXXXX で指定（生グリフは書かない）。
#   starship_label    : 続けて出す固有名詞（""=アイコンのみ）
#   starship_color    : アイコン＋ラベルの **fg（フォント色）**。tokyo-night のベタ塗り背景を避け
#                       fg で出し分ける（背景ブロックは廃止）。
#
#   --- provision 能力フラグ（bootstrap が読む正本。bootstrap-linux が主 consumer） ---
#   これまで bootstrap 各節に散らばっていた「誰に何を入れるか」（WSL 判定×5 / raspi 判定×4 /
#   GUI 検出）を env ごとの1行に集約する。各 bootstrap 節はこのフラグを読むだけにする。
#   op            : 1Password CLI を native 導入（apt）するか
#   op_interop    : op を Windows op.exe interop に寄せるか（WSL のみ true。common.sh も同じ列を読む）
#   gui_apps      : GUI デスクトップアプリ（1Password app / Obsidian）を入れるか
#   tailscale     : Tailscale を入れるか
#   docker        : Docker(rootless) を入れるか
#   sshd          : openssh-server を入れるか
#   tauri_build   : Tauri 2(score-checker desktop)の GTK/webkit dev ライブラリを入れるか（重い→WSL のみ）
#   ※ win/mac は winget-packages.json / Brewfile が導入の正本なので、これらフラグは全 false
#     （linux 系＝WSL/surface/raspi/汎用 Linux の出し分け専用）。
#
#   --- アプリ層（app 軸: os/env/weight と直交。infra フラグの「上」に乗る機能単位） ---
#   apps : 導入アプリ名のリスト。linux.sh 末尾の apps runner が各要素を
#          install/apps/<name>.sh として実行する（DF_APPS 経由）。空 = []。
#          アプリ追加 = install/apps/<name>.sh を置き、対象 env の apps に "<name>" を足すだけ。
#          ※現状 runner は linux.sh のみ（mac/win は未消費・将来用に列だけ持つ）。
#          ※アプリが要求する infra（HA なら docker）は、その env のフラグを true にしておく。

[envs.win]                      # Windows ネイティブ（machine=local-pc）
weight = "full"
ghostty_font_size = 24          # ※Windows は ghostty を .chezmoiignore で除外（値は参考）
starship_icon = ""        # nf windows
starship_label = ""             # Windows ロゴだけで一意 → アイコンのみ
starship_color = "#a3aed2"
op = false                      # win/mac は winget/Brewfile が正本（フラグは linux 系専用）
op_interop = false
gui_apps = false
tailscale = false
docker = false
sshd = false
tauri_build = false                  # Tauri ビルド依存は重い → 必要なのは local-pc/WSL のみ
apps = []                       # win は winget が正本。app runner は未消費（将来用）

[envs.wsl]                      # local-pc 上の WSL（machine=local-pc・kernel で判定）
weight = "full"
ghostty_font_size = 24
starship_icon = ""  # nf windows + tux = WSL らしさ（Ubuntu ロゴを避ける）
starship_label = "wsl"
starship_color = "#00b8d4"
op = false                      # native op は Windows アプリ連携に繋がらない → interop に寄せる
op_interop = true               # op→op.exe（common.sh が alias、bootstrap は native 導入 skip）
gui_apps = false                # GUI は Windows 側を使う
tailscale = false               # Windows の Tailscale を interop で使う
docker = false                  # Windows の Docker Desktop を interop で使う
sshd = false                    # Windows 側 sshd / 既存経路を使う
tauri_build = true                   # Tauri 2(score-checker desktop)のビルドに必要な GTK/webkit dev ライブラリ群を入れる
apps = []

[envs.surface]                  # Surface Go 3（machine=surface-go3・GUI デスクトップ）
weight = "lite"
ghostty_font_size = 16          # 220PPI/10.5"・150% → 24pt は大きすぎる
starship_icon = ""        # nf ubuntu
starship_label = "surface"
starship_color = "#e95420"
op = true
op_interop = false
gui_apps = true                 # 本物のグラフィカルデスクトップ
tailscale = true
docker = true
sshd = true
tauri_build = false                  # Tauri ビルド依存は重い → 必要なのは local-pc/WSL のみ
apps = []

[envs.raspi]                    # Raspberry Pi（machine=raspi4・slim・headless）
weight = "slim"
ghostty_font_size = 24
starship_icon = ""        # nf raspberry pi
starship_label = "raspi"
starship_color = "#c51a4a"
op = false                      # slim＝素のシェル用途。秘密バックエンドは対象外
op_interop = false
gui_apps = false                # headless
tailscale = true                # headless ほどリモート到達の価値が高い
docker = true                   # apps の Home Assistant が docker 必須のため有効
sshd = true                     # ssh 受け側として必要
tauri_build = false                  # Tauri ビルド依存は重い → 必要なのは local-pc/WSL のみ
apps = ["homeassistant"]        # Home Assistant を install/apps/homeassistant.sh で導入

[envs.mac]                      # macOS（仕事用・現在未接続）
weight = "full"
ghostty_font_size = 24
starship_icon = ""        # nf apple
starship_label = ""             # Apple ロゴだけで一意 → アイコンのみ
starship_color = "#888888"
op = false                      # mac は Brewfile が正本（フラグは linux 系専用）
op_interop = false
gui_apps = false
tailscale = false
docker = false
sshd = false
tauri_build = false                  # Tauri ビルド依存は重い → 必要なのは local-pc/WSL のみ
apps = []

[envs.linux]                    # 未分類の汎用 Linux（fallback・headless サーバ想定）
weight = "full"
ghostty_font_size = 24
starship_icon = ""        # nf tux
starship_label = ""
starship_color = "#a3aed2"
op = true
op_interop = false
gui_apps = false                # 汎用は headless 既定（GUI 機なら個別に true へ）
tailscale = true
docker = true
sshd = true
tauri_build = false                  # Tauri ビルド依存は重い → 必要なのは local-pc/WSL のみ
apps = []                       # 汎用 Linux も既定は空。サーバ用途でアプリを足すならここに
